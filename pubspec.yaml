name: onetest
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  auto_size_text: 3.0.0
  cached_network_image: 3.4.1
  cached_network_image_platform_interface: 4.1.1
  cached_network_image_web: 1.3.1
  cloud_firestore: ^6.7.1
  cloud_firestore_platform_interface: ^8.0.5
  cloud_firestore_web: ^5.7.1
  collection: 1.19.1
  firebase_auth: ^6.5.6
  firebase_auth_platform_interface: ^9.0.5
  firebase_auth_web: ^6.2.5
  firebase_core: ^4.12.1
  firebase_core_platform_interface: ^8.0.0
  firebase_core_web: ^3.9.1
  firebase_crashlytics: ^5.2.6
  firebase_crashlytics_platform_interface: ^3.8.26
  firebase_performance: ^0.11.4+5
  firebase_performance_platform_interface: ^0.2.0+5
  firebase_performance_web: ^0.1.8+11
  floating_bottom_navigation_bar: 1.5.2
  flutter_animate: ^4.5.2
  flutter_cache_manager: 3.4.1
  flutter_svg: ^2.3.0
  font_awesome_flutter: ^11.0.0
  from_css_color: 2.0.0
  go_router: ^17.3.0
  google_fonts: ^8.2.0
  google_sign_in: ^7.2.0
  google_sign_in_android: ^7.2.15
  google_sign_in_ios: ^6.3.0
  google_sign_in_platform_interface: ^3.1.0
  google_sign_in_web: ^1.1.3
  intl: 0.20.2
  json_path: ^0.9.0
  page_transition: ^2.2.2
  path_provider: ^2.1.6
  path_provider_android: ^2.3.1
  path_provider_foundation: ^2.6.0
  path_provider_linux: ^2.2.2
  path_provider_platform_interface: ^2.1.3
  path_provider_windows: 2.3.0
  plugin_platform_interface: 2.1.8
  provider: ^6.1.5+1
  purchases_flutter: ^10.4.2
  rxdart: ^0.28.0
  shared_preferences: ^2.5.5
  shared_preferences_android: ^2.4.27
  shared_preferences_foundation: ^2.5.6
  shared_preferences_linux: 2.4.1
  shared_preferences_platform_interface: ^2.4.2
  shared_preferences_web: 2.4.3
  shared_preferences_windows: 2.4.1
  sign_in_with_apple: ^8.1.0
  sign_in_with_apple_platform_interface: 2.0.0
  sign_in_with_apple_web: 3.0.0
  sqflite: ^2.4.3
  sqflite_common: ^2.5.11
  stream_transform: ^2.1.1
  styled_divider: ^1.0.5
  timeago: 3.7.1
  url_launcher: ^6.3.2
  url_launcher_android: ^6.3.32
  url_launcher_ios: ^6.4.1
  url_launcher_linux: ^3.2.2
  url_launcher_macos: ^3.2.5
  url_launcher_platform_interface: 2.3.2
  url_launcher_web: ^2.4.3
  url_launcher_windows: ^3.1.5
  file_picker: ^8.1.7
  csv: ^6.0.0
  excel: ^4.0.6
  firebase_storage: ^13.4.5

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.0

dependency_overrides:
  http: 1.4.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  image: any
  lints: ^6.1.0
  flutter_test:
    sdk: flutter


flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  web:
    generate: true
  image_path: 'assets/images/app_launcher_icon.jpg'
  adaptive_icon_background: '#00000000'
  adaptive_icon_foreground: 'assets/images/adaptive_foreground_icon.png'


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/

  fonts:
    - family: TablerIconsFilled
      fonts:
        - asset: assets/fonts/tabler-icons-filled.ttf
    - family: TablerIconsOutline
      fonts:
        - asset: assets/fonts/tabler-icons-outline.ttf


  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

